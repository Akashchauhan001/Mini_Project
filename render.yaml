services:
  - type: web
    name: arid-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: NEO4J_AVAILABLE
        value: "false"
      - key: OPENAI_API_KEY
        value: ""
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: arid-data
      mountPath: /opt/render/project/src
      sizeGB: 1
